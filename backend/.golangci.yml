version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/DevilGenius

run:
  exclude-dirs:
    - ent

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
