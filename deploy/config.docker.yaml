server:
  port: 9517
  mode: release
  web_dir: frontend

database:
  host: postgres
  port: 5432
  user: airgate
  password: airgate
  dbname: airgate
  sslmode: disable

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  tls: false

jwt:
  secret: airgate-docker-secret-change-me
  expire_hour: 24

security:
  api_key_secret: ""             # 留空使用内置默认密钥；或填入 hex 编码的 64 字符密钥

log:
  level: info
  format: text

plugins:
  dir: data/plugins
