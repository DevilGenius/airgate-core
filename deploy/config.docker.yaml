server:
  host: 0.0.0.0
  port: 9517
  mode: release
  trusted_proxies: []
  web_dir: frontend

database:
  host: postgres
  port: 5432
  user: airgate
  password: ""                   # 必须通过 DB_PASSWORD 注入
  dbname: airgate
  sslmode: disable

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  tls: false

jwt:
  secret: ""                     # 必须通过 JWT_SECRET 注入
  expire_hour: 24

security:
  api_key_secret: ""             # 必须通过 API_KEY_SECRET 注入，32 字节 hex（64 字符）

log:
  level: info
  format: text

plugins:
  dir: data/plugins
